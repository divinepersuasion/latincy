&gt; &lt;body&gt; &lt;diu1&gt; &lt;head&gt; &lt;hi&gt;LIBER PRIMUS.&lt;/hi&gt; &lt;/head&gt; &lt;diu3&gt; 
<mark class="entity" style="background: #aa9cfc; padding: 0.45em 0.6em; margin: 0 0.25em; line-height: 1; border-radius: 0.35em;">
    &lt;head&gt;1
    <span style="font-size: 0.8em; font-weight: bold; line-height: 1; border-radius: 0.35em; vertical-align: middle; margin-left: 0.5rem">PERSON</span>
</mark>
. &lt;/head&gt; &lt;p&gt; &lt;pb n=&quot;0559B&quot;/&gt;Testimonium ignorantiae uestrae, quae iniquitatem dum defendit, reuincit, in promptu est, quod omnes, qui uobiscum retro ignorabant et uobiscum oderant, simul eis contigit scire, desinunt odisse qui desinunt ignorare, imo fiunt et ipsi quod oderant, et incipiunt odisse quod fuerant. Adeo quotidie adolescentem numerum Christianorum ingemitis. Obsessam uociferamini ciuitatem; in agris, in castellis, in insulis 
<mark class="entity" style="background: #c887fb; padding: 0.45em 0.6em; margin: 0 0.25em; line-height: 1; border-radius: 0.35em;">
    Christianos
    <span style="font-size: 0.8em; font-weight: bold; line-height: 1; border-radius: 0.35em; vertical-align: middle; margin-left: 0.5rem">NORP</span>
</mark>
; omnem sexum, omnem aetatem, omnem denique dignitatem transgredi a uobis quasi detrimento doletis. Nec tamen hoc ipso ad aestimationem alicujus latentis boni animos promouetis; non licet rectius suspicari, non libet propius experiri; hic tantum curiositas &lt;pb n=&quot;0559C&quot;/&gt; humana torpescit. 
<mark class="entity" style="background: #aa9cfc; padding: 0.45em 0.6em; margin: 0 0.25em; line-height: 1; border-radius: 0.35em;">
    Amatis
    <span style="font-size: 0.8em; font-weight: bold; line-height: 1; border-radius: 0.35em; vertical-align: middle; margin-left: 0.5rem">PERSON</span>
</mark>
 ignorare, quod alii gaudeant inuenisse; mauultis nescire, quia jam odistis, quasi certe non odituros uos sciatis. Atquin, si nullum erit odii, reperietur optimum utique ab injustitia priore discedere; sin uero caussa constiterit, nihil odio detrahetur, quod adeo amplius justitiae scientia cumulabitur, nisi si emendari pudet aut excusari piget. Scio plane, qua responsione soletis redundantiae nostrae testimonium conuenire: non utique eo bonum praejudicari, quia plerosque conuertat et sibi rapiat, inquitis. Noui demutationem mentis et malas partes. Quot desertores bonae uitae? quot transfugae in peruersum? Multi bona fide, imo jam plures pro extremitatibus temporum. Uerum deficit adaequatio comparationis istius. Nam de malo ita constat &lt;pb n=&quot;0559D&quot;/&gt; apud omnes, ut ne ipsi quidem rei, qui ad malum transeunt et a uobis in peruersa diuertunt, defendere malum pro bono audeant. Turpia timori, pudori impia habent; denique gestiunt latere, deuitant apparere, trepidant deprehensi, negant accusati; ne torti quidem facile aut semper confitentur, certe damnati moerent; exprobrant etenim quod erant in semetipsos: &lt;pb n=&quot;0560B&quot;/&gt; malae mentis ab innocentia transitum uel fato imputant; adeo nolunt suum esse, quia malum negare non possunt. 
<mark class="entity" style="background: #aa9cfc; padding: 0.45em 0.6em; margin: 0 0.25em; line-height: 1; border-radius: 0.35em;">
    Christiani
    <span style="font-size: 0.8em; font-weight: bold; line-height: 1; border-radius: 0.35em; vertical-align: middle; margin-left: 0.5rem">PERSON</span>
</mark>
 uero quid tale consequuntur? Neminem pudet, neminem poenitet, nisi tantum pristinorum. Si denotatur, gloriatur: si trahitur, non subsistit. Si accusatur, non defendit; interrogatus, confitetur; damnatus, gloriatur. Quod hoc malum est, in quo mali natura cessat?&lt;/p&gt; 
<mark class="entity" style="background: #c887fb; padding: 0.45em 0.6em; margin: 0 0.25em; line-height: 1; border-radius: 0.35em;">
    &lt;/diu3
    <span style="font-size: 0.8em; font-weight: bold; line-height: 1; border-radius: 0.35em; vertical-align: middle; margin-left: 0.5rem">NORP</span>
</mark>
&gt; &lt;diu3&gt; &lt;head&gt;2.&lt;/head&gt; &lt;p&gt; In quo ipsi etiam contra formam indicandorum malorum judicatis. Nam nocentes quidem perductos, si admissum negent, tormentis urgetis ad confessionem, 
<mark class="entity" style="background: #c887fb; padding: 0.45em 0.6em; margin: 0 0.25em; line-height: 1; border-radius: 0.35em;">
    Christianos
    <span style="font-size: 0.8em; font-weight: bold; line-height: 1; border-radius: 0.35em; vertical-align: middle; margin-left: 0.5rem">NORP</span>
</mark>
 uero sponte confessos tormentis comprimitis ad negationem. Quae tanta peruersitas, &lt;pb n=&quot;0560C&quot;/&gt; ut confessioni repugnetis, tormentorum officia mutetis, gratis reum euadere, inuitum compellentes negare? Praesides extorquendae ueritatis, de solis nobis mendacium exquiritis, ut dicamus nos non esse quod sumus. Opinor, non uultis nos malos esse, ideoque gestitis de isto nomine excludere. Sane caeteros ad hoc tenditis et carnificatis, ut negent esse quod esse dicuntur. Atquin illis negantibus non creditis; nobis, si negauerimus, statim creditis. Si certi estis nos nocentissimos esse, cur etiam in hoc aliter quam nocentes a uobis agimur? Non dico quod neque accusationi neque recusationi spatium commodetis; soletis et inaccusatos et indefensos non temere damnare. Sed uerbi gratia si de homicida confutatur, non statim confesso eo nomen homicidae dispuncta caussa est aut &lt;pb n=&quot;0560D&quot;/&gt; satiata cognitio. Quanquam confessis difficile creditis; uerum insuper consequentia exigitis, quotiens caedem egerit, quibus in locis, quibus spoliis, sociis, receptoribus, ne quid omnino mali hominis delitescat, aut desit aliquid instruendae ad sententiam ueritati. Porro de nobis, quos atrocioribus ac pluribus criminibus deputatis, breuiora ac leuiora elogia conficitis. &lt;pb n=&quot;0561A&quot;/&gt; Credo, non uultis oneratos, quos omni opere perditos uultis, aut non putatis requirenda quae nostis. Hoc ergo peruersius, si cogitis negare, de quibus certissime scitis, imo, quod magis odio uestro competebat, seposita forma judicandi, proprio studio non ad negationem certare, ne quos odistis liberaretis, sed ad confessionem singulorum scelerum, quo magis inimicitiae satiarentur ex aggeratione poenarum, dum recognoscitur, quot quisque jam conuiuia illa celebrasset, quotiens in tenebris incursionis incesta. Quid? quod eradicandi generis diffundenda erat requisitio, porrigenda quaestio in socios consciosque. Perducerentur infantarii et coqui et ipsi canes pronubi, emendata res esset. Etiam spectaculis gratia aggregaretur; quanto enim studio in caueam &lt;pb n=&quot;0561B&quot;/&gt; conueniretur, depugnaturo aliquo, qui centum infantes deuorasset? Sed enim tam horrenda tamque monstruosa de nobis deferuntur. Utique erui debuerunt, ne incredibilia uiderentur, et odium in nos publicum refrigesceret. Nam et plerique fidem talium temperant, horrentes naturam quaerere pabulum ferinum, quam concubitus ab humano genere praeclusit.&lt;/p&gt; 
<mark class="entity" style="background: #c887fb; padding: 0.45em 0.6em; margin: 0 0.25em; line-height: 1; border-radius: 0.35em;">
    &lt;/diu3
    <span style="font-size: 0.8em; font-weight: bold; line-height: 1; border-radius: 0.35em; vertical-align: middle; margin-left: 0.5rem">NORP</span>
</mark>
&gt; &lt;diu3&gt; &lt;head&gt;3.&lt;/head&gt; &lt;p&gt; Uos igitur, alias diligentissimi ac pertinacissimi discussores scelerum longe minorum, cum talibus tam horrendis et omnem impietatem supergressis eam diligentiam deseratis, neque confessionem recipiendo judicantibus semper laborandam, neque exquisitionem digerendo damnatoribus semper consulendam: jam apparet, omne in nos crimen non alicujus sceleris sed nominis dirigi. Adeo, si de criminum &lt;pb n=&quot;0561C&quot;/&gt;</div>
